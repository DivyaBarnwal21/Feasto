<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | Feasto</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>
    <!-- Navbar -->
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <ion-icon name="restaurant"></ion-icon> Feasto<span>.</span>
            </a>
            <nav>
                <ul class="nav-links" id="navbox">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="menu.html" class="active">Menu</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
            <div class="nav-icons">
                <a href="cart.html" class="cart-icon">
                    <ion-icon name="cart-outline"></ion-icon>
                    <span class="cart-count">0</span>
                </a>
                <div class="hamburger" id="hamburger">
                    <ion-icon name="menu-outline"></ion-icon>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container" style="padding-top: 120px;">
            <h2 class="section-title">Our Menu</h2>

            <!-- Filters -->
            <div class="filter-container">
                <button class="filter-btn active" data-id="all">All</button>
                <button class="filter-btn" data-id="pizza">Pizza</button>
                <button class="filter-btn" data-id="burger">Burger</button>
                <button class="filter-btn" data-id="indian">Indian</button>
                <button class="filter-btn" data-id="chinese">Chinese</button>
                <button class="filter-btn" data-id="dessert">Desserts</button>
                <button class="filter-btn" data-id="drinks">Drinks</button>
            </div>

            <!-- Menu Grid -->
            <div class="food-grid" id="menu-grid" style="margin-top: 40px; margin-bottom: 80px;">
                <div class="loading">Loading menu...</div>
            </div>
        </div>
    </main>

    <!-- JS -->
    <script type="module" src="assets/js/script.js"></script>
</body>

</html>
