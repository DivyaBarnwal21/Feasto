<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Feasto</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/chatbot.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <ion-icon name="restaurant"></ion-icon> Feasto<span>.</span>
            </a>
            <nav>
                <ul class="nav-links" id="navbox">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>
            <div class="nav-icons">
                <a href="cart.html" class="cart-icon">
                    <ion-icon name="cart-outline"></ion-icon>
                    <span class="cart-count">0</span>
                </a>
                <div class="hamburger" id="hamburger">
                    <ion-icon name="menu-outline"></ion-icon>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container" style="padding-top: 120px; padding-bottom: 80px;">
            <h2 class="section-title">Contact Us</h2>

            <div class="contact-box"
                style="max-width: 600px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: var(--shadow);">
                <form id="contactForm">
                    <div style="margin-bottom: 20px;">
                        <input type="text" id="name" placeholder="Your Name"
                            style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px;">
                    </div>
                    <div style="margin-bottom: 20px;">
                        <input type="email" id="email" placeholder="Your Email"
                            style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px;">
                    </div>
                    <div style="margin-bottom: 20px;">
                        <textarea id="message" rows="5" placeholder="Your Message"
                            style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px;"></textarea>
                    </div>
                    <button type="submit" class="btn" style="width: 100%;">Send Message</button>
                </form>
            </div>
        </div>
    </main>

    <script type="module" src="assets/js/script.js"></script>
    <script>
        document.getElementById('contactForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;

            if (name && email && message) {
                alert('Message sent successfully!');
                this.reset();
            } else {
                alert('Please fill in all fields.');
            }
        });
    </script>
    <script src="assets/js/chatbot.js"></script>
</body>

</html>
