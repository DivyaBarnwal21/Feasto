<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Signup | Feasto</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/auth.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>
    <!-- Navbar -->
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <ion-icon name="restaurant"></ion-icon> Feasto<span>.</span>
            </a>
            <nav>
                <ul class="nav-links" id="navbox">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="login.html" class="active">Login</a></li>
                </ul>
            </nav>
            <div class="nav-icons">
                <a href="cart.html" class="cart-icon">
                    <ion-icon name="cart-outline"></ion-icon>
                    <span class="cart-count">0</span>
                </a>
                <div class="hamburger" id="hamburger">
                    <ion-icon name="menu-outline"></ion-icon>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container auth-container"
            style="padding-top: 120px; text-align: center; max-width: 400px; margin: 0 auto; margin-bottom: 80px;">

            <div id="login-form-container">
                <h2 class="section-title">Login</h2>
                <form id="login-form" class="auth-form"
                    style="display: flex; flex-direction: column; gap: 15px; margin-top: 30px;">
                    <div style="text-align: left;">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" required
                            style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;"
                            placeholder="Enter your email">
                    </div>
                    <div style="text-align: left;">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required
                            style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;"
                            placeholder="Enter your password">
                    </div>
                    <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Login</button>
                    <p style="margin-top: 15px;">Don't have an account? <a href="#"
                            onclick="toggleAuthMode(); return false;" style="color: var(--primary-color);">Sign up</a>
                    </p>
                </form>
            </div>

            <div id="register-form-container" style="display: none;">
                <h2 class="section-title">Sign Up</h2>
                <form id="register-form" class="auth-form"
                    style="display: flex; flex-direction: column; gap: 15px; margin-top: 30px;">
                    <div style="text-align: left;">
                        <label for="register-name">Full Name</label>
                        <input type="text" id="register-name" required
                            style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;"
                            placeholder="Enter your full name">
                    </div>
                    <div style="text-align: left;">
                        <label for="register-email">Email</label>
                        <input type="email" id="register-email" required
                            style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;"
                            placeholder="Enter your email">
                    </div>
                    <div style="text-align: left;">
                        <label for="register-password">Password</label>
                        <input type="password" id="register-password" required
                            style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;"
                            placeholder="Create a password">
                    </div>
                    <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Sign Up</button>
                    <p style="margin-top: 15px;">Already have an account? <a href="#"
                            onclick="toggleAuthMode(); return false;" style="color: var(--primary-color);">Login</a></p>
                </form>
            </div>

            <div id="auth-error" style="color: red; margin-top: 15px;"></div>
        </div>
    </main>

    <!-- JS -->
    <script type="module" src="assets/js/script.js"></script>
    <script>
        function toggleAuthMode() {
            const login = document.getElementById('login-form-container');
            const register = document.getElementById('register-form-container');
            const errorDiv = document.getElementById('auth-error');
            errorDiv.innerHTML = '';

            if (login.style.display === 'none') {
                login.style.display = 'block';
                register.style.display = 'none';
            } else {
                login.style.display = 'none';
                register.style.display = 'block';
            }
        }
    </script>
</body>

</html>
