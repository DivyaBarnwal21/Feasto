<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | Feasto</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>
    <!-- Navbar -->
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <ion-icon name="restaurant"></ion-icon> Feasto<span>.</span>
            </a>
            <nav>
                <ul class="nav-links" id="navbox">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
            <div class="nav-icons">
                <a href="cart.html" class="cart-icon">
                    <ion-icon name="cart-outline"></ion-icon>
                    <span class="cart-count">0</span>
                </a>
                <div class="hamburger" id="hamburger">
                    <ion-icon name="menu-outline"></ion-icon>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container" style="padding-top: 120px; padding-bottom: 80px;">
            <h2 class="section-title">Your Cart</h2>

            <div class="cart-container" id="cart-container">
                <div class="cart-items" id="cart-items">
                    <!-- Items rendered via JS -->
                    <div class="empty-cart-msg">Your cart is empty.</div>
                </div>

                <div class="cart-summary" id="cart-summary">
                    <h3>Order Summary</h3>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="subtotal">$0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Delivery Fee</span>
                        <span>$5.00</span>
                    </div>
                    <hr>
                    <div class="summary-row total">
                        <span>Total</span>
                        <span id="total-price">$0.00</span>
                    </div>
                    <button class="btn checkout-btn" onclick="checkout()">Proceed to Checkout</button>
                </div>
            </div>
        </div>
    </main>

    <!-- JS -->
    <script type="module" src="assets/js/script.js"></script>
</body>

</html>
